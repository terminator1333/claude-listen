name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.12

      - name: Ruff check
        run: uv tool run ruff check scripts/

      - name: Ruff format check
        run: uv tool run ruff format --check scripts/

      - name: Python syntax check
        run: python -m py_compile scripts/transcribe.py

      - name: CLI smoke test (--help)
        run: python scripts/transcribe.py --help

      - name: Validate uv lockfile
        run: uv lock --check
